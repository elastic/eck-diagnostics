apiVersion: v1
kind: Pod
metadata:
  name: {{ .PodName }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: eck-diagnostics
spec:
  terminationGracePeriodSeconds: 0
  automountServiceAccountToken: false
  {{- if .ImagePullSecrets }}
  imagePullSecrets:
  {{- range .ImagePullSecrets }}
    - name: {{ . }}
  {{- end }}
  {{- end }}
  containers:
    - name: {{ .MainContainerName }}
      image: {{ .DiagnosticImage }}
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      {{- if or (and .ESSecretName .ESSecretKey) .KeystoreSecretName }}
      env:
        {{- if (and .ESSecretName .ESSecretKey) }}
        - name: ES_PW
          valueFrom:
            secretKeyRef:
              name: {{ .ESSecretName }}
              key: {{ .ESSecretKey }}
        {{- end }}
        {{- if .KeystoreSecretName }}
        - name: KEYSTORE_PW
          valueFrom:
            secretKeyRef:
              name: {{ .KeystoreSecretName }}
              key: {{ .KeystorePasswordKey }}
        {{- end }}
      {{- end }}
      volumeMounts:
        - name: output
          mountPath: {{ .OutputDir }}
        {{- if .KeystoreSecretName }}
        - name: client-cert
          mountPath: {{ .KeystoreMountPath }}
          readOnly: true
        {{- end }}
      command: [sh, -c]
      args:
        - |
          cd {{ .OutputDir }}
          /support-diagnostics/diagnostics.sh -h {{.SVCName}} --type {{.Type}} --bypassDiagVerify \
            {{if (and .ESSecretName .ESSecretKey) }} -u {{ .ESSecretKey }} --passwordText $ES_PW{{end}} \
            {{if .TLS}} -s --noVerify {{end}} \
            {{if .KeystoreSecretName }} --pkiKeystore {{ .KeystoreMountPath }}/{{ .KeystoreFile }} --pkiPassText $KEYSTORE_PW{{end}} \
            -o .
          touch ready
          while true; do sleep 1; done;
      readinessProbe:
        exec:
          command:
            - cat
            - {{ .OutputDir }}/ready
      resources:
        requests:
          memory: 20Mi
          cpu: 100m
        limits:
          memory: 2Gi
          cpu: 1
  volumes:
    - name: output
      emptyDir: {}
    {{- if .KeystoreSecretName }}
    - name: client-cert
      secret:
        secretName: {{ .KeystoreSecretName }}
        items:
          - key: {{ .KeystoreFile }}
            path: {{ .KeystoreFile }}
    {{- end }}
  restartPolicy: Never
